name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/setup-node@v5
      with:
        node-version: 24
    - uses: actions/checkout@v5
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: dom, curl, libxml, mbstring, zip, fileinfo, intl, pgsql
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
    - name: Install Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Generate key
      run: php artisan key:generate
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite
    - name: Publish JWT config
      run: php artisan vendor:publish --provider="Tymon\JWTAuth\Providers\Laravel\ServiceProvider"
    - name: Create JWT Secret Key
      run: php artisan jwt:secret --force
    - name: Verify JWT
      run: grep JWT_SECRET .env
    - name: Execute tests (Feature tests) via PHPUnit/Pest
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test
